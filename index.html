<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Melon Top Picks</title>

    <style>
      @import url("https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@100..900&display=swap");

      :root {
        --melon-green: #00c73c;
        --melon-dark: #00a832;
        --melon-light: rgba(0, 199, 60, 0.12);

        --red-point: #e53935;
        --blue-point: #4a90e2;
        --mint-point: #58d2b2;
        --pink-point: #ff86b5;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Noto Sans KR", sans-serif;
      }

      body {
        overflow-x: hidden;
        background: #ffffff;
      }

      section {
        position: relative;
        width: 100%;
        min-height: 100vh;
        background: #ffffff;
        padding: 100px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        overflow: hidden;
        isolation: isolate;
      }

      header {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        padding: 28px 100px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        z-index: 10;
      }

      header .logo {
        text-decoration: none;
        font-size: 34px;
        font-weight: 900;
        color: var(--melon-green);
        letter-spacing: -1px;
      }

      header .logo span {
        color: #111;
        font-size: 15px;
        font-weight: 800;
        margin-left: 8px;
        vertical-align: middle;
      }

      header ul {
        display: flex;
        gap: 34px;
      }

      header ul li {
        list-style: none;
      }

      header ul li a {
        display: inline-block;
        color: #222;
        font-size: 15px;
        font-weight: 700;
        text-decoration: none;
        transition: 0.3s;
      }

      header ul li a:hover {
        color: var(--melon-green);
      }

      .content {
        position: relative;
        width: 100%;
        display: flex;
        justify-content: space-between;
        align-items: center;
        z-index: 2;
        gap: 40px;
      }

      .content .textBox {
        position: relative;
        max-width: 620px;
        z-index: 3;
      }

      .badge {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 8px 16px;
        margin-bottom: 20px;
        border-radius: 999px;
        background: var(--melon-light);
        color: var(--melon-dark);
        font-size: 14px;
        font-weight: 900;
      }

      .content .textBox h2 {
        color: #111;
        font-size: 4.4em;
        line-height: 1.13em;
        font-weight: 900;
        letter-spacing: -3px;
      }

      .content .textBox h2 span {
        color: var(--red-point);
        transition: color 0.4s ease;
        display: inline-block;
      }

      .songMeta {
        margin-top: 18px;
        color: #333;
        font-size: 21px;
        font-weight: 800;
        letter-spacing: -0.8px;
      }

      .songDesc {
        margin-top: 18px;
        max-width: 540px;
        color: #555;
        font-size: 16px;
        line-height: 1.8;
        font-weight: 500;
      }

      .content .textBox a {
        display: inline-block;
        margin-top: 28px;
        padding: 13px 28px;
        background: var(--melon-green);
        color: #fff;
        border-radius: 40px;
        font-size: 15px;
        font-weight: 900;
        letter-spacing: -0.2px;
        text-decoration: none;
        box-shadow: 0 16px 30px rgba(0, 199, 60, 0.24);
        transition: 0.3s;
        cursor: pointer;
      }

      .content .textBox a:hover {
        transform: translateY(-3px);
        box-shadow: 0 20px 38px rgba(0, 199, 60, 0.32);
      }

      .content .imgBox {
        width: 560px;
        display: flex;
        justify-content: center;
        align-items: center;
        padding-right: 20px;
        margin-top: 20px;
        z-index: 3;
      }

      .recordWrap {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 24px;
        transition: transform 0.18s ease-out;
        transform-style: preserve-3d;
        will-change: transform;
      }

      .recordCard {
        position: relative;
        width: 420px;
        height: 420px;
        border-radius: 50%;
        background: repeating-radial-gradient(
          circle at center,
          #101010 0px,
          #101010 7px,
          #181818 7px,
          #181818 14px
        );
        box-shadow:
          0 35px 70px rgba(0, 0, 0, 0.28),
          inset 0 0 0 12px #0b0b0b,
          inset 0 0 0 24px #141414;
        display: flex;
        justify-content: center;
        align-items: center;
        overflow: hidden;
        transition: 0.4s;
        animation: recordSpin 14s linear infinite;
        cursor: pointer;
      }

      .recordCard:hover {
        animation-play-state: paused;
      }

      @keyframes recordSpin {
        from {
          transform: rotate(0deg);
        }
        to {
          transform: rotate(360deg);
        }
      }

      .recordCard.change {
        animation:
          recordPop 0.45s ease,
          recordSpin 14s linear infinite;
      }

      @keyframes recordPop {
        0% {
          transform: scale(0.97) rotate(0deg);
        }
        55% {
          transform: scale(1.015) rotate(5deg);
        }
        100% {
          transform: scale(1) rotate(8deg);
        }
      }

      .recordCard::before {
        content: "";
        position: absolute;
        inset: 24px;
        border-radius: 50%;
        border: 1px solid rgba(255, 255, 255, 0.07);
        pointer-events: none;
      }

      .recordCard::after {
        content: "";
        position: absolute;
        width: 110px;
        height: 110px;
        border-radius: 50%;
        border: 1px solid rgba(255, 255, 255, 0.05);
        pointer-events: none;
      }

      .recordLabel {
        position: relative;
        width: 175px;
        height: 175px;
        border-radius: 50%;
        overflow: hidden;
        border: 8px solid #2a2a2a;
        box-shadow:
          0 0 0 10px #101010,
          0 10px 30px rgba(0, 0, 0, 0.35);
        z-index: 2;
        background: #222;
      }

      .recordLabel img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
      }

      .recordHole {
        position: absolute;
        width: 18px;
        height: 18px;
        border-radius: 50%;
        background: #0a0a0a;
        border: 2px solid rgba(255, 255, 255, 0.12);
        z-index: 3;
      }

      .recordMeta {
        text-align: center;
        color: #111;
      }

      .recordMeta .rank {
        display: inline-block;
        margin-bottom: 8px;
        padding: 6px 12px;
        border-radius: 999px;
        background: var(--melon-light);
        color: var(--melon-dark);
        font-size: 13px;
        font-weight: 900;
      }

      .recordMeta h3 {
        font-size: 28px;
        line-height: 1.2;
        letter-spacing: -1px;
        margin-bottom: 6px;
      }

      .recordMeta p {
        font-size: 15px;
        color: #666;
        font-weight: 700;
      }

      .thumb {
        position: absolute;
        bottom: 28px;
        display: flex;
        gap: 18px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 5;
        flex-wrap: wrap;
        justify-content: center;
      }

      .thumb li {
        list-style: none;
        cursor: pointer;
        transition: 0.3s;
      }

      .thumb li:hover {
        transform: translateY(-10px);
      }

      .thumbButton {
        width: 155px;
        min-height: 78px;
        padding: 14px 16px;
        border: 1px solid rgba(0, 0, 0, 0.08);
        border-radius: 22px;
        background: rgba(255, 255, 255, 0.82);
        backdrop-filter: blur(12px);
        box-shadow: 0 16px 35px rgba(0, 0, 0, 0.08);
        transition:
          transform 0.3s ease,
          box-shadow 0.3s ease;
      }

      .thumbButton:hover {
        box-shadow: 0 18px 40px rgba(0, 0, 0, 0.14);
      }

      .thumbButton strong {
        display: block;
        color: #111;
        font-size: 14px;
        font-weight: 900;
        letter-spacing: -0.5px;
        margin-bottom: 4px;
      }

      .thumbButton span {
        display: block;
        color: #666;
        font-size: 12px;
        font-weight: 700;
        letter-spacing: -0.3px;
      }

      .sci {
        position: absolute;
        top: 50%;
        right: 30px;
        transform: translateY(-50%);
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 14px;
        z-index: 5;
      }

      .sci li {
        list-style: none;
      }

      .sci li a {
        width: 44px;
        height: 44px;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.85);
        color: #111;
        display: flex;
        align-items: center;
        justify-content: center;
        text-decoration: none;
        font-size: 13px;
        font-weight: 900;
        box-shadow: 0 12px 28px rgba(0, 0, 0, 0.12);
        transition: 0.3s;
      }

      .sci li a:hover {
        background: var(--melon-green);
        color: #fff;
        transform: translateX(-4px);
      }

      .circle {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: radial-gradient(
          circle at 52% 48%,
          #f06a66 0%,
          #e53935 42%,
          #cf2f2b 100%
        );
        clip-path: circle(760px at right 820px);
        transition:
          background 0.4s ease,
          clip-path 0.18s ease-out;
        z-index: 1;
        overflow: hidden;
      }

      .circle::after {
        content: "";
        position: absolute;
        inset: -8%;
        background: inherit;
        border-radius: 50%;
        opacity: 0;
        transform: scale(1);
        pointer-events: none;
      }

      .circle.motion-red::after {
        animation: innerPulse 0.7s ease;
      }

      .circle.motion-mint::after {
        animation: innerWave 0.9s ease;
      }

      .circle.motion-blue::after {
        animation: innerFloat 0.8s ease;
      }

      .circle.motion-pink::after {
        animation: innerSoftBounce 0.75s ease;
      }

      @keyframes innerPulse {
        0% {
          opacity: 0.18;
          transform: scale(0.96);
        }
        50% {
          opacity: 0.28;
          transform: scale(1.03);
        }
        100% {
          opacity: 0;
          transform: scale(1.06);
        }
      }

      @keyframes innerWave {
        0% {
          opacity: 0.14;
          transform: scale(0.98) translateX(0);
        }
        35% {
          opacity: 0.22;
          transform: scale(1.01) translateX(-10px);
        }
        70% {
          opacity: 0.18;
          transform: scale(1.03) translateX(8px);
        }
        100% {
          opacity: 0;
          transform: scale(1.05) translateX(0);
        }
      }

      @keyframes innerFloat {
        0% {
          opacity: 0.16;
          transform: scale(0.98) translateY(14px);
        }
        60% {
          opacity: 0.24;
          transform: scale(1.02) translateY(-6px);
        }
        100% {
          opacity: 0;
          transform: scale(1.05) translateY(0);
        }
      }

      @keyframes innerSoftBounce {
        0% {
          opacity: 0.16;
          transform: scale(0.98);
        }
        45% {
          opacity: 0.24;
          transform: scale(1.025);
        }
        75% {
          opacity: 0.12;
          transform: scale(1.01);
        }
        100% {
          opacity: 0;
          transform: scale(1.04);
        }
      }

      .ripple-wave {
        position: absolute;
        width: 20px;
        height: 20px;
        border-radius: 50%;
        transform: translate(-50%, -50%);
        border: 3px solid currentColor;
        opacity: 0.55;
        pointer-events: none;
        z-index: 2;
        animation: rippleBurst 0.9s ease-out forwards;
        mix-blend-mode: multiply;
      }

      @keyframes rippleBurst {
        0% {
          width: 20px;
          height: 20px;
          opacity: 0.55;
        }
        100% {
          width: 420px;
          height: 420px;
          opacity: 0;
        }
      }

      @media (max-width: 1100px) {
        section {
          padding: 110px 28px 260px;
        }

        header {
          padding: 24px 28px;
        }

        header ul {
          display: none;
        }

        .content {
          flex-direction: column;
          align-items: flex-start;
        }

        .content .textBox h2 {
          font-size: 3.1em;
        }

        .content .imgBox {
          width: 100%;
          justify-content: center;
          padding-right: 0;
          margin-top: 10px;
        }

        .recordCard {
          width: 320px;
          height: 320px;
        }

        .recordLabel {
          width: 135px;
          height: 135px;
        }

        .thumb {
          width: 92%;
        }

        .sci {
          right: 18px;
        }

        .circle {
          clip-path: circle(620px at right 760px);
        }
      }
    </style>
  </head>

  <body>
    <section id="heroSection">
      <div class="circle" id="bgCircle"></div>

      <header>
        <a href="https://www.melon.com/" class="logo">
          Melon<span>TOP PICKS</span>
        </a>

        <ul>
          <li>
            <a href="https://www.melon.com/chart/index.htm" target="_blank"
              >멜론차트</a
            >
          </li>
          <li>
            <a href="https://www.melon.com/new/index.htm" target="_blank"
              >최신음악</a
            >
          </li>
          <li>
            <a href="https://www.melon.com/genre/song_list.htm" target="_blank"
              >장르음악</a
            >
          </li>
          <li>
            <a
              href="https://www.melon.com/dj/today/djtoday_list.htm"
              target="_blank"
              >멜론DJ</a
            >
          </li>
        </ul>
      </header>

      <div class="content">
        <div class="textBox">
          <div class="badge" id="badge">Melon TOP Picks</div>

          <h2>
            오늘 가장 뜨거운<br />
            <span id="mainTitle">REDRED</span>
          </h2>

          <div class="songMeta" id="artistName">CORTIS</div>

          <p class="songDesc" id="songDesc">
            2026년 4월 20일에 발매된 CORTIS의 두 번째 EP 《GREENGREEN》의 리드
            싱글이자 타이틀곡.
          </p>

          <a
            href="#"
            onclick="
              playCurrentAudio();
              return false;
            "
            >도입부 1분 듣기</a
          >
        </div>

        <div class="imgBox">
          <div class="recordWrap">
            <div class="recordCard" id="albumCard" onclick="playCurrentAudio()">
              <div class="recordLabel">
                <img
                  id="albumImage"
                  src="./images/redred.png"
                  alt="곡 이미지"
                />
              </div>
              <div class="recordHole"></div>
            </div>

            <div class="recordMeta">
              <div class="rank" id="rankText">TOP 1</div>
              <h3 id="albumSong">REDRED</h3>
              <p id="albumArtist">CORTIS</p>
            </div>
          </div>
        </div>
      </div>

      <ul class="thumb">
        <li onclick="songSlider(0, event)">
          <div class="thumbButton">
            <strong>01 REDRED</strong>
            <span>CORTIS</span>
          </div>
        </li>

        <li onclick="songSlider(1, event)">
          <div class="thumbButton">
            <strong>02 소문의 낙원</strong>
            <span>AKMU</span>
          </div>
        </li>

        <li onclick="songSlider(2, event)">
          <div class="thumbButton">
            <strong>03 it's me</strong>
            <span>ILLIT</span>
          </div>
        </li>

        <li onclick="songSlider(3, event)">
          <div class="thumbButton">
            <strong>04 캐치 캐치</strong>
            <span>YENA</span>
          </div>
        </li>
      </ul>

      <ul class="sci">
        <li><a href="#">TOP</a></li>
        <li><a href="#">NEW</a></li>
        <li><a href="#">DJ</a></li>
      </ul>

      <audio id="audioPlayer"></audio>
    </section>

    <script>
      let currentSongIndex = 0;
      let audioTimer = null;

      const songs = [
        {
          rank: "TOP 1",
          title: "REDRED",
          artist: "CORTIS",
          desc: "2026년 4월 20일에 발매된 CORTIS의 두 번째 EP 《GREENGREEN》의 리드 싱글이자 타이틀곡.",
          circle: "#E53935",
          gradient:
            "radial-gradient(circle at 52% 48%, #f06a66 0%, #E53935 42%, #cf2f2b 100%)",
          titleColor: "#E53935",
          image: "./images/redred.png",
          audio: "./audio/redred.mp3",
          motionClass: "motion-red",
        },
        {
          rank: "TOP 2",
          title: "소문의 낙원",
          artist: "AKMU",
          desc: "2026년 4월 7일에 발매된 AKMU의 네 번째 정규 앨범.",
          circle: "#58d2b2",
          gradient:
            "radial-gradient(circle at 52% 48%, #7de2c7 0%, #58d2b2 42%, #43bea0 100%)",
          titleColor: "#26b48f",
          image: "./images/paradise of rumors.jpg",
          audio: "./audio/paradise-of-rumors.mp3",
          motionClass: "motion-mint",
        },
        {
          rank: "TOP 3",
          title: "it's me",
          artist: "ILLIT",
          desc: "2026년 4월 30일에 발매된 ILLIT의 네 번째 미니 앨범.",
          circle: "#5DADEC",
          gradient:
            "radial-gradient(circle at 52% 48%, #72acf0 0%, #5DADEC 42%, #357bd0 100%)",
          titleColor: "#2D9CDB",
          image: "./images/its me.png",
          audio: "./audio/its-me.mp3",
          motionClass: "motion-blue",
        },
        {
          rank: "TOP 4",
          title: "캐치 캐치",
          artist: "YENA",
          desc: "2026년 3월 17일에 발매된 최예나의 디지털 싱글이자 미니 5집 LOVE CATCHER의 타이틀곡 캐치 캐치의 리믹스 음원이다.",
          circle: "#ff86b5",
          gradient:
            "radial-gradient(circle at 52% 48%, #ffaad0 0%, #ff86b5 42%, #f56aa3 100%)",
          titleColor: "#ff5d9f",
          image: "./images/sped up.png",
          audio: "./audio/sped-up.mp3",
          motionClass: "motion-pink",
        },
      ];

      function clearCircleMotion(circle) {
        circle.classList.remove(
          "motion-red",
          "motion-mint",
          "motion-blue",
          "motion-pink",
        );
      }

      function createRipple(event, color) {
        const section = document.getElementById("heroSection");
        const ripple = document.createElement("span");
        ripple.className = "ripple-wave";
        ripple.style.color = color;

        const rect = section.getBoundingClientRect();
        const x = event ? event.clientX - rect.left : rect.width * 0.7;
        const y = event ? event.clientY - rect.top : rect.height * 0.5;

        ripple.style.left = x + "px";
        ripple.style.top = y + "px";

        section.appendChild(ripple);

        setTimeout(() => {
          ripple.remove();
        }, 900);
      }

      function songSlider(index, event) {
        currentSongIndex = index;
        const song = songs[index];

        document.getElementById("rankText").innerHTML = song.rank;
        document.getElementById("mainTitle").innerHTML = song.title;
        document.getElementById("artistName").innerHTML = song.artist;
        document.getElementById("songDesc").innerHTML = song.desc;
        document.getElementById("albumSong").innerHTML = song.title;
        document.getElementById("albumArtist").innerHTML = song.artist;

        const circle = document.getElementById("bgCircle");
        circle.style.background = song.gradient;
        document.getElementById("mainTitle").style.color = song.titleColor;

        document.getElementById("albumImage").src = song.image;
        document.getElementById("albumImage").alt = song.title + " 이미지";

        const audioPlayer = document.getElementById("audioPlayer");
        audioPlayer.pause();
        audioPlayer.currentTime = 0;
        audioPlayer.src = song.audio;

        clearTimeout(audioTimer);

        clearCircleMotion(circle);
        void circle.offsetWidth;
        circle.classList.add(song.motionClass);

        const record = document.getElementById("albumCard");
        record.classList.remove("change");
        void record.offsetWidth;
        record.classList.add("change");

        createRipple(event, song.circle);
      }

      function playCurrentAudio() {
        const song = songs[currentSongIndex];
        const audioPlayer = document.getElementById("audioPlayer");

        clearTimeout(audioTimer);

        audioPlayer.pause();
        audioPlayer.currentTime = 0;
        audioPlayer.src = song.audio;

        audioPlayer
          .play()
          .then(function () {
            audioTimer = setTimeout(function () {
              audioPlayer.pause();
              audioPlayer.currentTime = 0;
            }, 60000);
          })
          .catch(function () {
            alert(
              "오디오 파일을 찾을 수 없습니다. audio 폴더와 mp3 파일명을 확인하세요.",
            );
          });
      }

      const heroSection = document.getElementById("heroSection");
      const recordWrap = document.querySelector(".recordWrap");
      const bgCircle = document.getElementById("bgCircle");

      heroSection.addEventListener("mousemove", function (event) {
        const rect = heroSection.getBoundingClientRect();

        const x = event.clientX - rect.left;
        const y = event.clientY - rect.top;

        const centerX = rect.width / 2;
        const centerY = rect.height / 2;

        const rotateX = ((y - centerY) / centerY) * -4;
        const rotateY = ((x - centerX) / centerX) * 4;

        recordWrap.style.transform =
          "perspective(900px) rotateX(" +
          rotateX +
          "deg) rotateY(" +
          rotateY +
          "deg)";

        const moveX = (x / rect.width - 0.5) * 12;
        const moveY = (y / rect.height - 0.5) * 12;

        bgCircle.style.clipPath =
          "circle(760px at calc(100% + " +
          moveX +
          "px) calc(820px + " +
          moveY +
          "px))";
      });

      heroSection.addEventListener("mouseleave", function () {
        recordWrap.style.transform =
          "perspective(900px) rotateX(0deg) rotateY(0deg)";

        bgCircle.style.clipPath = "circle(760px at right 820px)";
      });
    </script>
  </body>
</html>
